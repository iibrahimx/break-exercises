<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-stone-100 min-h-screen"
    style="font-family: &quot;Manrope&quot;, sans-serif"
  >
    <main class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8">
        <h1 class="text-center text-4xl font-extrabold text-stone-800 mb-8">
          Interactive Quiz
        </h1>
        <div class="mb-8">
          <div class="flex justify-between mb-2">
            <span class="font-medium text-stone-700"> Progress </span>
            <span id="progress-text" class="text-stone-600"> 0 / 10 </span>
          </div>
          <div class="w-full bg-stone-200 rounded-full h-3 overflow-hidden">
            <div
              id="progress-bar"
              class="bg-emerald-600 h-3 rounded-full transition-all duration-300"
              style="width: 0%"
            ></div>
          </div>
        </div>
        <div id="quiz-container">
          <h2
            id="question"
            class="text-xl font-bold text-stone-800 mb-8 text-center"
          >
            Question appears here
          </h2>
          <div id="answers" class="grid gap-4"></div>
          <button
            id="next-btn"
            class="mt-6 w-full bg-emerald-700 text-white py-4 rounded-xl font-semibold hover:bg-emerald-800 transition cursor-pointer"
          >
            Next Question
          </button>
        </div>
        <div id="result-container" class="hidden">
          <h2 class="text-3xl font-bold text-center text-stone-800 mb-4">
            Quiz Complete
          </h2>
          <p id="score" class="text-center text-lg mb-2"></p>
          <p id="best-score" class="text-center text-stone-600 mb-6"></p>
          <button
            id="restart-btn"
            class="w-full bg-amber-700 text-white py-3 rounded-lg hover:bg-amber-800 transition"
          >
            Restart Quiz
          </button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
